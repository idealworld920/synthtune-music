name: ai_music_edu
description: SynthTune Music - AI-powered music education app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.2.0

  # Audio
  record: ^6.0.0
  fftea: ^1.1.0

  # Charts
  fl_chart: ^0.69.0

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Auth
  google_sign_in: ^6.2.2

  # Camera
  camera: ^0.11.0+2

  # Email
  mailer: ^6.1.0

  # Utils
  timeago: ^3.7.0
  intl: ^0.19.0
  path_provider: ^2.1.4

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
